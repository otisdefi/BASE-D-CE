<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Base Dice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --text: #e8e8e8;
    --muted: #555;
    --accent: #0052ff;
    --accent-dim: rgba(0, 82, 255, 0.12);
    --success: #00c896;
    --error: #ff4444;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 0;
    position: relative;
  }

  /* Header */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  .logo-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
  }

  .wallet-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .wallet-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .wallet-btn.connected {
    border-color: var(--success);
    color: var(--success);
  }

  /* Main dice area */
  .dice-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  /* Dice */
  .dice-wrapper {
    position: relative;
    width: 140px;
    height: 140px;
  }

  .dice {
    width: 140px;
    height: 140px;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: 18px;
    gap: 0;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .dice::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(0,82,255,0.06), transparent 60%);
    border-radius: 24px;
    pointer-events: none;
  }

  .dice:hover {
    border-color: #333;
  }

  .dice.rolling {
    animation: diceRoll 0.6s ease-in-out;
  }

  @keyframes diceRoll {
    0% { transform: rotate(0deg) scale(1); }
    20% { transform: rotate(-15deg) scale(0.95); }
    40% { transform: rotate(12deg) scale(1.05); }
    60% { transform: rotate(-8deg) scale(0.98); }
    80% { transform: rotate(5deg) scale(1.02); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .dot {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dot-inner {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text);
    opacity: 0;
    transition: opacity 0.15s, background 0.3s;
  }

  .dot-inner.visible {
    opacity: 1;
  }

  .dot-inner.fresh {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(0, 82, 255, 0.5);
  }

  /* Dot positions per number */
  /* 1 */ .dice[data-val="1"] .pos-center .dot-inner { opacity: 1; }
  /* 2 */ .dice[data-val="2"] .pos-top-right .dot-inner,
          .dice[data-val="2"] .pos-bot-left .dot-inner { opacity: 1; }
  /* 3 */ .dice[data-val="3"] .pos-top-right .dot-inner,
          .dice[data-val="3"] .pos-center .dot-inner,
          .dice[data-val="3"] .pos-bot-left .dot-inner { opacity: 1; }
  /* 4 */ .dice[data-val="4"] .pos-top-left .dot-inner,
          .dice[data-val="4"] .pos-top-right .dot-inner,
          .dice[data-val="4"] .pos-bot-left .dot-inner,
          .dice[data-val="4"] .pos-bot-right .dot-inner { opacity: 1; }
  /* 5 */ .dice[data-val="5"] .pos-top-left .dot-inner,
          .dice[data-val="5"] .pos-top-right .dot-inner,
          .dice[data-val="5"] .pos-center .dot-inner,
          .dice[data-val="5"] .pos-bot-left .dot-inner,
          .dice[data-val="5"] .pos-bot-right .dot-inner { opacity: 1; }
  /* 6 */ .dice[data-val="6"] .pos-top-left .dot-inner,
          .dice[data-val="6"] .pos-top-right .dot-inner,
          .dice[data-val="6"] .pos-mid-left .dot-inner,
          .dice[data-val="6"] .pos-mid-right .dot-inner,
          .dice[data-val="6"] .pos-bot-left .dot-inner,
          .dice[data-val="6"] .pos-bot-right .dot-inner { opacity: 1; }

  /* Info row */
  .info-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-height: 64px;
  }

  .result-num {
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .result-num.show { opacity: 1; }

  .result-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Action area */
  .action-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .tap-hint {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .gas-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .gas-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Status bar */
  .status-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-msg {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    transition: color 0.3s;
  }

  .status-msg.loading { color: var(--accent); }
  .status-msg.success { color: var(--success); }
  .status-msg.error { color: var(--error); }

  .roll-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--border);
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 8px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error { border-color: var(--error); color: var(--error); }
  .toast.success { border-color: var(--success); color: var(--success); }

  /* Overlay for when not connected */
  .connect-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
    transition: opacity 0.3s;
  }

  .connect-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .connect-title {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.6;
  }

  .connect-cta {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 12px 28px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
  }

  .connect-cta:hover {
    background: rgba(0,82,255,0.2);
  }

  .chain-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 20px;
  }

  .chain-badge .logo-dot { width: 5px; height: 5px; }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      base dice
    </div>
    <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">connect wallet</button>
  </div>

  <!-- Connect overlay -->
  <div class="connect-overlay" id="connectOverlay">
    <div class="chain-badge">
      <div class="logo-dot"></div>
      Base Network
    </div>
    <div class="connect-title">Zar atmak için<br>cüzdanını bağla</div>
    <button class="connect-cta" onclick="connectWallet()">Cüzdanı Bağla</button>
  </div>

  <!-- Dice container -->
  <div class="dice-container">

    <div class="dice-wrapper">
      <div class="dice" id="dice" data-val="0" onclick="rollDice()">
        <div class="dot pos-top-left"><div class="dot-inner" id="tl"></div></div>
        <div class="dot pos-top-mid"><div class="dot-inner"></div></div>
        <div class="dot pos-top-right"><div class="dot-inner" id="tr"></div></div>
        <div class="dot pos-mid-left"><div class="dot-inner" id="ml"></div></div>
        <div class="dot pos-center"><div class="dot-inner" id="c"></div></div>
        <div class="dot pos-mid-right"><div class="dot-inner" id="mr"></div></div>
        <div class="dot pos-bot-left"><div class="dot-inner" id="bl"></div></div>
        <div class="dot pos-bot-mid"><div class="dot-inner"></div></div>
        <div class="dot pos-bot-right"><div class="dot-inner" id="br"></div></div>
      </div>
    </div>

    <div class="info-row">
      <div class="result-num" id="resultNum">—</div>
      <div class="result-label" id="resultLabel">henüz atılmadı</div>
    </div>

    <div class="action-area">
      <div class="tap-hint" id="tapHint">zarı tıkla</div>
      <div class="gas-info">
        <div class="gas-dot"></div>
        <span>~0.0001 ETH gas · Base</span>
      </div>
    </div>

  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-msg" id="statusMsg">cüzdan bekleniyor</div>
    <div class="roll-count" id="rollCount">0 atış</div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ─── State ───────────────────────────────────────────────────
  let isConnected = false;
  let walletAddress = '';
  let isRolling = false;
  let rollCount = 0;
  const BASE_CHAIN_ID = '0x2105'; // Base mainnet = 8453

  // ─── Wallet ──────────────────────────────────────────────────
  async function connectWallet() {
    if (!window.ethereum) {
      showToast('MetaMask veya uyumlu bir cüzdan gerekli', 'error');
      return;
    }

    try {
      setStatus('bağlanıyor...', 'loading');

      // Request accounts
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      walletAddress = accounts[0];

      // Switch to Base
      try {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: BASE_CHAIN_ID }],
        });
      } catch (switchErr) {
        // Add Base if not found
        if (switchErr.code === 4902) {
          await window.ethereum.request({
            method: 'wallet_addEthereumChain',
            params: [{
              chainId: BASE_CHAIN_ID,
              chainName: 'Base',
              nativeCurrency: { name: 'Ethereum', symbol: 'ETH', decimals: 18 },
              rpcUrls: ['https://mainnet.base.org'],
              blockExplorerUrls: ['https://basescan.org'],
            }],
          });
        }
      }

      isConnected = true;
      const short = walletAddress.slice(0,6) + '...' + walletAddress.slice(-4);
      document.getElementById('walletBtn').textContent = short;
      document.getElementById('walletBtn').classList.add('connected');
      document.getElementById('connectOverlay').classList.add('hidden');
      setStatus('hazır · Base', '');
      showToast('Bağlandı ✓', 'success');

    } catch (err) {
      setStatus('bağlantı başarısız', 'error');
      showToast(err.message || 'Hata oluştu', 'error');
    }
  }

  // ─── Dice Roll ───────────────────────────────────────────────
  async function rollDice() {
    if (!isConnected) { showToast('Önce cüzdanını bağla', 'error'); return; }
    if (isRolling) return;
    isRolling = true;

    const dice = document.getElementById('dice');
    const resultNum = document.getElementById('resultNum');
    const resultLabel = document.getElementById('resultLabel');
    const tapHint = document.getElementById('tapHint');

    // Reset display
    resultNum.classList.remove('show');
    tapHint.textContent = 'onay bekleniyor...';
    setStatus('işlem gönderiliyor...', 'loading');

    try {
      // Send a tiny gas-only transaction to self (0 ETH, just gas fee)
      const txHash = await window.ethereum.request({
        method: 'eth_sendTransaction',
        params: [{
          from: walletAddress,
          to: walletAddress,
          value: '0x0',
          data: '0x' + Date.now().toString(16).padStart(64, '0'), // unique data each roll
        }],
      });

      // Animate while waiting
      tapHint.textContent = 'zar dönüyor...';
      setStatus('tx: ' + txHash.slice(0,10) + '...', 'loading');
      dice.classList.add('rolling');

      // Use tx hash as randomness seed
      const seed = parseInt(txHash.slice(-8), 16);
      const result = (seed % 6) + 1;

      // Wait for animation
      await new Promise(r => setTimeout(r, 650));
      dice.classList.remove('rolling');

      // Show result
      dice.setAttribute('data-val', result);
      highlightFreshDots(result);
      resultNum.textContent = result;
      resultNum.classList.add('show');

      rollCount++;
      document.getElementById('rollCount').textContent = rollCount + ' atış';
      resultLabel.textContent = getLabelForResult(result);
      tapHint.textContent = 'tekrar tıkla';
      setStatus('tx onaylandı · ' + txHash.slice(0,10) + '...', 'success');
      showToast('Sonuç: ' + result, 'success');

    } catch (err) {
      tapHint.textContent = 'zarı tıkla';
      setStatus('işlem iptal edildi', 'error');
      showToast('İptal edildi', 'error');
    }

    isRolling = false;
  }

  function highlightFreshDots(val) {
    // Remove all fresh classes first
    document.querySelectorAll('.dot-inner').forEach(d => d.classList.remove('fresh'));
    // Re-render: force reflow by briefly removing and re-adding data-val
    const dice = document.getElementById('dice');
    dice.setAttribute('data-val', 0);
    requestAnimationFrame(() => {
      dice.setAttribute('data-val', val);
      document.querySelectorAll('.dot-inner').forEach(d => {
        const computed = window.getComputedStyle(d).opacity;
        if (parseFloat(computed) > 0.5) d.classList.add('fresh');
      });
      setTimeout(() => {
        document.querySelectorAll('.dot-inner.fresh').forEach(d => d.classList.remove('fresh'));
      }, 1200);
    });
  }

  function getLabelForResult(n) {
    const labels = { 1: 'bir', 2: 'iki', 3: 'üç', 4: 'dört', 5: 'beş', 6: 'altı' };
    return labels[n] || '';
  }

  // ─── UI Helpers ──────────────────────────────────────────────
  function setStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg ' + type;
  }

  let toastTimeout;
  function showToast(msg, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    clearTimeout(toastTimeout);
    requestAnimationFrame(() => {
      toast.classList.add('show');
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 2200);
    });
  }

  // Account/chain change listeners
  if (window.ethereum) {
    window.ethereum.on('accountsChanged', (accs) => {
      if (!accs.length) {
        isConnected = false;
        walletAddress = '';
        document.getElementById('walletBtn').textContent = 'connect wallet';
        document.getElementById('walletBtn').classList.remove('connected');
        document.getElementById('connectOverlay').classList.remove('hidden');
        setStatus('cüzdan bağlantısı kesildi', 'error');
      }
    });
    window.ethereum.on('chainChanged', () => window.location.reload());
  }
</script>
</body>
</html>
